document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

nt-family: 'Source Serif 4', serif; font-size: 24px; font-weight: 600; color: #262019; margin-bottom: 20px;\">Your habits &amp; data<\u002Fdiv>\n\n            <div style=\"font-size: 12px; font-weight: 600; letter-spacing: 1px; color: #A39A87; margin: 0 2px 8px;\">HABITS<\u002Fdiv>\n            <div style=\"background: #FFFFFF; border: 1px solid #E8E1D0; border-radius: 18px; overflow: hidden; margin-bottom: 10px;\">\n              <sc-for list=\"{{settingsHabits}}\" as=\"h\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{h.openEdit}}\" style=\"display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-bottom: 1px solid #F0EBDC; cursor: pointer;\">\n                  <div style=\"width: 34px; height: 34px; border-radius: 50%; background: rgba(46,79,62,0.1); display: flex; align-items: center; justify-content: center; flex-shrink: 0;\">\n                    <span style=\"font-family: 'Source Serif 4', serif; font-weight: 600; font-size: 13px; color: #2E4F3E;\">{{h.initials}}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"flex: 1; min-width: 0;\">\n                    <div dir=\"ltr\" style=\"font-size: 14.5px; font-weight: 600; color: #262019; text-align: left;\">{{h.name}}<\u002Fdiv>\n                    <div style=\"font-size: 12px; color: #A39A87; margin-top: 1px;\">Since {{h.createdLabel}}<sc-if value=\"{{h.isCounted}}\" hint-placeholder-val=\"{{false}}\"> · target {{h.target}}<\u002Fsc-if><\u002Fdiv>\n                  <\u002Fdiv>\n                  <svg width=\"7\" height=\"12\" viewBox=\"0 0 7 12\" fill=\"none\"><path d=\"M1 1l5 5-5 5\" stroke=\"#C2BAA5\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div onclick=\"{{openAddSheet}}\" style=\"display: flex; align-items: center; gap: 8px; padding: 12px 4px; cursor: pointer; margin-bottom: 26px;\">\n              <span style=\"font-size: 18px; color: #2E4F3E;\">+<\u002Fspan>\n              <span style=\"font-size: 14px; font-weight: 600; color: #2E4F3E;\">Add a habit<\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"font-size: 12px; font-weight: 600; letter-spacing: 1px; color: #A39A87; margin: 0 2px 8px;\">DATA<\u002Fdiv>\n            <div style=\"background: #FFFFFF; border: 1px solid #E8E1D0; border-radius: 18px; overflow: hidden; margin-bottom: 18px;\">\n              <div onclick=\"{{exportData}}\" style=\"display: flex; align-items: center; gap: 12px; padding: 14px; border-bottom: 1px solid #F0EBDC; cursor: pointer;\">\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 17 17\" fill=\"none\"><path d=\"M8.5 1v10M4.5 7l4 4 4-4\" stroke=\"#2E4F3E\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M1.5 13.5v2h14v-2\" stroke=\"#2E4F3E\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size: 14.5px; font-weight: 600; color: #262019;\">Export data<\u002Fspan>\n              <\u002Fdiv>\n              <div onclick=\"{{triggerImport}}\" style=\"display: flex; align-items: center; gap: 12px; padding: 14px; cursor: pointer;\">\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 17 17\" fill=\"none\"><path d=\"M8.5 11V1M4.5 5l4-4 4 4\" stroke=\"#2E4F3E\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M1.5 13.5v2h14v-2\" stroke=\"#2E4F3E\" stroke-width=\"1.6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size: 14.5px; font-weight: 600; color: #262019;\">Import data<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{confirmingReset}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"background: #FFFFFF; border: 1px solid #E8E1D0; border-radius: 18px; padding: 16px; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px;\">\n                <span style=\"font-size: 13.5px; color: #262019;\">Replace your data with sample habits? This can't be undone.<\u002Fspan>\n                <div style=\"display: flex; gap: 10px;\">\n                  <button onclick=\"{{cancelResetConfirm}}\" style=\"flex: 1; padding: 10px 0; border-radius: 999px; border: 1px solid #E8E1D0; background: transparent; color: #8A8071; font-weight: 600; font-size: 13.5px; cursor: pointer;\">Cancel<\u002Fbutton>\n                  <button onclick=\"{{doReset}}\" style=\"flex: 1; padding: 10px 0; border-radius: 999px; border: none; background: #9C3B3B; color: #fff; font-weight: 600; font-size: 13.5px; cursor: pointer;\">Restore sample<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{notConfirmingReset}}\" hint-placeholder-val=\"{{true}}\">\n              <div onclick=\"{{askResetConfirm}}\" style=\"text-align: center; padding: 10px; font-size: 13px; color: #A39A87; cursor: pointer;\">Restore sample data<\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"text-align: center; margin-top: 30px; font-size: 12px; color: #C2BAA5;\">Habitlens · stored only on this device<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n\n      <sc-if value=\"{{showTabBar}}\" hint-placeholder-val=\"{{true}}\">\n        <div id=\"hl-tabbar\" style=\"display: flex; padding: 10px 12px 22px; gap: 4px; border-top: 1px solid #E8E1D0; background: rgba(251,248,241,0.94); flex-shrink: 0;\">\n          <div onclick=\"{{goToday}}\" style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: {{tabTodayColor}};\">\n            <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"12\" cy=\"12\" r=\"9\" stroke=\"currentColor\" stroke-width=\"1.6\"><\u002Fcircle><path d=\"M8 12.5l2.5 2.5L16 9.5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n            <span style=\"font-size: 11px; font-weight: 600;\">Today<\u002Fspan>\n          <\u002Fdiv>\n          <div onclick=\"{{goSettings}}\" style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: {{tabSettingsColor}};\">\n            <svg width=\"21\" height=\"21\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\"><\u002Fline><circle cx=\"15\" cy=\"7\" r=\"2\" fill=\"#FBF8F1\"><\u002Fcircle><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\"><\u002Fline><circle cx=\"9\" cy=\"12\" r=\"2\" fill=\"#FBF8F1\"><\u002Fcircle><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\"><\u002Fline><circle cx=\"13\" cy=\"17\" r=\"2\" fill=\"#FBF8F1\"><\u002Fcircle><\u002Fsvg>\n            <span style=\"font-size: 11px; font-weight: 600;\">Settings<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{isToday}}\" hint-placeholder-val=\"{{true}}\">\n        <button onclick=\"{{openAddSheet}}\" style=\"position: absolute; right: 20px; bottom: 96px; width: 56px; height: 56px; border-radius: 50%; background: #2E4F3E; color: #FFFFFF; border: none; font-size: 26px; line-height: 1; box-shadow: 0 10px 24px rgba(46,79,62,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: 'Work Sans', sans-serif; padding: 0;\">+<\u002Fbutton>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{showAddSheet}}\" hint-placeholder-val=\"{{false}}\">\n        <div onclick=\"{{closeSheet}}\" style=\"position: absolute; inset: 0; background: rgba(20,18,12,0.4); z-index: 40;\"><\u002Fdiv>\n        <div style=\"position: absolute; left: 0; right: 0; bottom: 0; z-index: 41; background: #FBF8F1; border-radius: 28px 28px 0 0; padding: 14px 24px 28px; box-shadow: 0 -10px 40px rgba(0,0,0,0.15); max-height: 80%; overflow-y: auto; transform: translateY(0);\">\n          <div style=\"display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;\">\n            <div style=\"width: 36px; height: 5px; border-radius: 3px; background: #E0D8C2;\"><\u002Fdiv>\n            <span onclick=\"{{closeSheet}}\" style=\"font-size: 13px; color: #A39A87; cursor: pointer;\">Cancel<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font-family: 'Source Serif 4', serif; font-size: 21px; font-weight: 600; color: #262019; margin: 10px 0 18px;\">{{sheetTitle}}<\u002Fdiv>\n\n          <div style=\"margin-bottom: 20px;\">\n            <div style=\"font-size: 11.5px; font-weight: 600; letter-spacing: 1px; color: #A39A87; margin-bottom: 8px;\">NAME<\u002Fdiv>\n            <input dir=\"ltr\" value=\"{{formName}}\" onchange=\"{{onNameChange}}\" placeholder=\"e.g. Morning run\" style=\"width: 100%; border: none; border-bottom: 2px solid #E0D8C2; background: transparent; font-family: 'Source Serif 4', serif; font-size: 19px; color: #262019; padding: 6px 2px; outline: none; text-align: left;\">\n          <\u002Fdiv>\n\n          <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;\">\n            <div>\n              <div style=\"font-size: 14px; font-weight: 600; color: #262019;\">Track a number<\u002Fdiv>\n              <div style=\"font-size: 12px; color: #A39A87; margin-top: 2px;\">For things like glasses of water<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{toggleHasTarget}}\" style=\"{{toggleTrackStyle}}\">\n              <div style=\"{{toggleKnobStyle}}\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{formHasTarget}}\" hint-placeholder-val=\"{{false}}\">\n            <div style=\"display: flex; align-items: center; gap: 14px; margin: 14px 0 8px; padding: 12px 16px; background: #F6F2E7; border-radius: 14px;\">\n              <span style=\"font-size: 13px; color: #8A8071; flex: 1;\">Daily target<\u002Fspan>\n              <button onclick=\"{{decTarget}}\" style=\"width: 28px; height: 28px; border-radius: 50%; border: 1px solid #E0D8C2; background: #fff; color: #8A8071; font-size: 15px; cursor: pointer; padding: 0;\">–<\u002Fbutton>\n              <span style=\"font-size: 15px; font-weight: 600; color: #262019; min-width: 20px; text-align: center;\">{{formTarget}}<\u002Fspan>\n              <button onclick=\"{{incTarget}}\" style=\"width: 28px; height: 28px; border-radius: 50%; border: none; background: #2E4F3E; color: #fff; font-size: 15px; cursor: pointer; padding: 0;\">+<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"margin-top: 18px;\">\n            <button onclick=\"{{onSaveClick}}\" style=\"{{saveBtnStyle}}\">{{saveBtnLabel}}<\u002Fbutton>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{isEditingHabit}}\" hint-placeholder-val=\"{{false}}\">\n            <sc-if value=\"{{confirmingDelete}}\" hint-placeholder-val=\"{{false}}\">\n              <div style=\"margin-top: 14px; padding: 14px; background: #FBEDED; border-radius: 14px; display: flex; flex-direction: column; gap: 12px;\">\n                <span style=\"font-size: 13px; color: #7A2E2E; line-height: 1.5;\">This permanently deletes \"{{editingHabitName}}\" and every day you've logged for it.<\u002Fspan>\n\n                <div style=\"display: flex; align-items: center; justify-content: space-between;\">\n                  <div>\n                    <div style=\"font-size: 13px; font-weight: 600; color: #262019;\">Back up my data first<\u002Fdiv>\n                    <div style=\"font-size: 11.5px; color: #A39A87; margin-top: 1px;\">Downloads a JSON copy before deleting<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div onclick=\"{{toggleBackup}}\" style=\"{{backupTrackStyle}}\">\n                    <div style=\"{{backupKnobStyle}}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <div>\n                  <div style=\"font-size: 11.5px; color: #7A2E2E; margin-bottom: 6px;\">Type \"{{editingHabitName}}\" to confirm<\u002Fdiv>\n                  <input dir=\"ltr\" value=\"{{deleteConfirmText}}\" onchange=\"{{onDeleteTextChange}}\" placeholder=\"{{editingHabitName}}\" style=\"width: 100%; border: 1px solid #E3B9B9; border-radius: 10px; background: #FFFFFF; font-size: 14px; color: #262019; padding: 9px 10px; outline: none; text-align: left;\">\n                <\u002Fdiv>\n\n                <div style=\"display: flex; gap: 10px;\">\n                  <button onclick=\"{{cancelDeleteConfirm}}\" style=\"flex: 1; padding: 9px 0; border-radius: 999px; border: 1px solid #E8E1D0; background: transparent; color: #8A8071; font-weight: 600; font-size: 13px; cursor: pointer;\">Cancel<\u002Fbutton>\n                  <button onclick=\"{{onConfirmDeleteClick}}\" style=\"{{confirmDeleteBtnStyle}}\">Delete habit<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{notConfirmingDelete}}\" hint-placeholder-val=\"{{true}}\">\n              <div onclick=\"{{askDeleteConfirm}}\" style=\"text-align: center; padding: 14px; font-size: 13px; color: #9C3B3B; cursor: pointer;\">Delete habit<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{hasToast}}\" hint-placeholder-val=\"{{false}}\">\n        <div style=\"position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%); background: #262019; color: #FBF8F1; padding: 10px 18px; border-radius: 999px; font-size: 13px; font-weight: 500; z-index: 50; box-shadow: 0 10px 24px rgba(0,0,0,0.25); white-space: nowrap;\">{{toastMsg}}<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <input type=\"file\" ref=\"{{fileInputRef}}\" accept=\"application/json\" onchange=\"{{handleImportChange}}\" style=\"display: none;\">\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"hl-caption\" style=\"font-family: 'Source Serif 4', serif; font-style: italic; color: #A39A87; font-size: 14px;\">A lifetime, day by day.<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    let data = null;\n    try {\n      const raw = localStorage.getItem('habitlens.v1');\n      if (raw) data = JSON.parse(raw);\n    } catch (e) {}\n    if (!data || !Array.isArray(data.habits) || !data.habits.length) {\n      data = this.generateSampleData();\n    }\n    this.state = {\n      screen: 'today', prevScreen: 'today', detailHabitId: null,\n      rowUnit: 'week', yearLayout: 'aligned', showAddSheet: false, editingHabitId: null,\n      formName: '', formHasTarget: false, formTarget: 8,\n      confirmingReset: false, confirmingDeleteHabit: false,\n      deleteConfirmText: '', backupBeforeDelete: true,\n      toastMsg: '', now: new Date(),\n      habits: data.habits, logs: data.logs || {},\n    };\n    this.fileInputRef = React.createRef();\n  }\n\n  componentDidMount() {\n    this._clockTimer = setInterval(() => this.setState({ now: new Date() }), 60000);\n  }\n  componentWillUnmount() {\n    if (this._clockTimer) clearInterval(this._clockTimer);\n    if (this._toastTimer) clearTimeout(this._toastTimer);\n  }\n\n  // ---------- date helpers ----------\n  pad(n) { return n < 10 ? '0' + n : '' + n; }\n  fmt(d) { return d.getFullYear() + '-' + this.pad(d.getMonth() + 1) + '-' + this.pad(d.getDate()); }\n  parseDate(s) { const p = s.split('-').map(Number); return new Date(p[0], p[1] - 1, p[2]); }\n  addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }\n  startOfWeekMonday(d) { const r = new Date(d); const wd = (r.getDay() + 6) % 7; r.setDate(r.getDate() - wd); r.setHours(0, 0, 0, 0); return r; }\n  daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }\n  sameDay(a, b) { return a.getFullYear() === b.ge ttings' }),\n\n      todayWeekdayLabel: ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'][today.getDay()],\n      todayDateLabel: this.monthLongName(today) + ' ' + today.getDate(),\n      ringStyle: { background: 'conic-gradient(#2E4F3E ' + ringPct + '%, #ECE6D5 0deg)', width: 48, height: 48, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 },\n      ringLabel: doneToday + '/' + totalToday,\n      hasPending: pendingHabits.length > 0,\n      hasCompleted: completedHabits.length > 0,\n      pendingHabits, completedHabits,\n      pendingCount: pendingHabits.length,\n      completedCount: completedHabits.length,\n      noHabitsAtAll: enriched.length === 0,\n      allDoneToday: enriched.length > 0 && pendingHabits.length === 0,\n      openAddSheet: () => this.openAddSheet(),\n\n      weekActive, monthActive, yearActive,\n      weekdayHeader: ['M', 'T', 'W', 'T', 'F', 'S', 'S'],\n      setWeek: () => this.setRowUnit('week'),\n      setMonth: () => this.setRowUnit('month'),\n      setYear: () => this.setRowUnit('year'),\n      weekBtnStyle: this.segBtnStyle(weekActive),\n      monthBtnStyle: this.segBtnStyle(monthActive),\n      yearBtnStyle: this.segBtnStyle(yearActive),\n\n      detailHabit,\n      backFromDetail: () => this.backFromDetail(),\n\n      settingsHabits: enriched,\n      confirmingReset: this.state.confirmingReset,\n      notConfirmingReset: !this.state.confirmingReset,\n      askResetConfirm: () => this.setState({ confirmingReset: true }),\n      cancelResetConfirm: () => this.setState({ confirmingReset: false }),\n      doReset: () => this.resetToSample(),\n      exportData: () => this.exportData(),\n      triggerImport: () => { if (this.fileInputRef.current) this.fileInputRef.current.click(); },\n      handleImportChange: (e) => this.handleImportChange(e),\n      fileInputRef: this.fileInputRef,\n\n      showAddSheet: this.state.showAddSheet,\n      sheetTitle: this.state.editingHabitId ? 'Edit Habit' : 'New Habit',\n      isEditingHabit: !!this.state.editingHabitId,\n      formName: this.state.formName,\n      onNameChange: (e) => this.setState({ formName: e.target.value }),\n      formHasTarget: this.state.formHasTarget,\n      toggleHasTarget: () => this.setState((s) => ({ formHasTarget: !s.formHasTarget })),\n      toggleTrackStyle: this.toggleTrackStyle(this.state.formHasTarget),\n      toggleKnobStyle: this.toggleKnobStyle(this.state.formHasTarget),\n      formTarget: this.state.formTarget,\n      incTarget: () => this.setState((s) => ({ formTarget: Math.min(99, s.formTarget + 1) })),\n      decTarget: () => this.setState((s) => ({ formTarget: Math.max(2, s.formTarget - 1) })),\n      saveBtnStyle: this.saveBtnStyle(this.state.formName.trim().length > 0),\n      saveBtnLabel: this.state.editingHabitId ? 'Save Changes' : 'Add Habit',\n      onSaveClick: () => { if (this.state.formName.trim().length > 0) this.saveForm(); },\n      closeSheet: () => this.closeSheet(),\n      confirmingDelete: this.state.confirmingDeleteHabit,\n      notConfirmingDelete: !this.state.confirmingDeleteHabit,\n      askDeleteConfirm: () => this.setState({ confirmingDeleteHabit: true, deleteConfirmText: '' }),\n      cancelDeleteConfirm: () => this.setState({ confirmingDeleteHabit: false, deleteConfirmText: '' }),\n      editingHabitName: (this.state.habits.find((h) => h.id === this.state.editingHabitId) || {}).name || '',\n      deleteConfirmText: this.state.deleteConfirmText,\n      onDeleteTextChange: (e) => this.setState({ deleteConfirmText: e.target.value }),\n      backupBeforeDelete: this.state.backupBeforeDelete,\n      toggleBackup: () => this.setState((s) => ({ backupBeforeDelete: !s.backupBeforeDelete })),\n      backupTrackStyle: this.toggleTrackStyle(this.state.backupBeforeDelete),\n      backupKnobStyle: this.toggleKnobStyle(this.state.backupBeforeDelete),\n      canConfirmDelete: this.state.deleteConfirmText.trim().toLowerCase() === ((this.state.habits.find((h) => h.id === this.state.editingHabitId) || {}).name || '__none__').trim().toLowerCase(),\n      confirmDeleteBtnStyle: this.confirmDeleteBtnStyle(this.state.deleteConfirmText.trim().toLowerCase() === ((this.state.habits.find((h) => h.id === this.state.editingHabitId) || {}).name || '__none__').trim().toLowerCase()),\n      onConfirmDeleteClick: () => { if (this.state.deleteConfirmText.trim().toLowerCase() === ((this.state.habits.find((h) => h.id === this.state.editingHabitId) || {}).name || '__none__').trim().toLowerCase()) this.confirmDeleteHabit(); },\n\n      hasToast: !!this.state.toastMsg,\n      toastMsg: this.state.toastMsg,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
